<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobrand Headline Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #dddbd5;
      --text: #1a1a18;
      --muted: #7a7870;
      --hint: #b0aea8;
      --ok-bg: #e8f5ee; --ok: #1a7a45;
      --warn-bg: #fef6e4; --warn: #92620a;
      --over-bg: #fdecea; --over: #b02a2a;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 4rem;
    }

    header {
      width: 100%;
      max-width: 580px;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    header p {
      font-size: 13px;
      color: var(--hint);
      margin-top: 4px;
      font-weight: 300;
    }

    .card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1.75rem;
      margin-bottom: 1px;
    }

    .card:first-of-type { border-radius: 3px 3px 0 0; }
    .card:last-of-type  { border-radius: 0 0 3px 3px; margin-bottom: 0; }
    .card:only-of-type  { border-radius: 3px; }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 1rem;
    }

    .field-hint {
      font-size: 12px;
      color: var(--hint);
      margin-bottom: 0.75rem;
      font-weight: 300;
    }

    .hl-wrap { position: relative; }

    textarea {
      display: block;
      width: 100%;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.75rem 4.5rem 0.75rem 0.875rem;
      resize: none;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #9a9890; }
    textarea::placeholder { color: var(--hint); }

    .counter {
      position: absolute;
      right: 10px;
      bottom: 10px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 2px;
      pointer-events: none;
      letter-spacing: 0.02em;
    }

    .ok   { background: var(--ok-bg);   color: var(--ok);   }
    .warn { background: var(--warn-bg); color: var(--warn); }
    .over { background: var(--over-bg); color: var(--over); }

    .divider {
      width: 100%;
      max-width: 580px;
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    .actions {
      width: 100%;
      max-width: 580px;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      border: none;
      border-radius: 2px;
      padding: 0 1.25rem;
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active:not(:disabled) { transform: scale(0.98); }

    #copybtn {
      background: var(--text);
      color: var(--bg);
    }

    #copybtn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .toast {
      font-size: 13px;
      color: var(--ok);
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }

    .output-wrap {
      width: 100%;
      max-width: 580px;
      margin-top: 1.5rem;
      display: none;
    }

    .output-wrap.visible { display: block; }

    .output-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 0.75rem;
    }

    pre {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.9;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1.25rem 1.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <header>
    <h1>Cobrand Headline Tool</h1>
    <p>Write within limits, copy output, send to client.</p>
  </header>

  <div class="card">
    <p class="card-label">Headline 1</p>
    <p class="field-hint">Sets the idea — why it matters. Use a strong quote or direct statement.</p>
    <div class="hl-wrap">
      <textarea id="h1" rows="3" placeholder="e.g. Thane Stenner: The defining attributes of an elite wealth advisory team" oninput="count('h1', 80)"></textarea>
      <span class="counter ok" id="h1-c">0 / 80</span>
    </div>
  </div>

  <div class="card" style="border-radius: 0 0 3px 3px; border-top: none;">
    <p class="card-label">Headline 2</p>
    <p class="field-hint">Creates curiosity and drives engagement.</p>
    <div class="hl-wrap">
      <textarea id="h2" rows="2" placeholder="e.g. What distinguishes the rare teams serving UHNW investors" oninput="count('h2', 55)"></textarea>
      <span class="counter ok" id="h2-c">0 / 55</span>
    </div>
  </div>

  <div class="actions">
    <button id="copybtn" onclick="copyOutput()" disabled>Copy output</button>
    <span class="toast" id="toast">✓ Copied to clipboard</span>
  </div>

  <div class="output-wrap" id="output-wrap">
    <p class="output-label">Output</p>
    <pre id="output-text"></pre>
  </div>

  <script>
    const DIV = '──────────────────────────────────────────────';

    function count(id, max) {
      const el = document.getElementById(id);
      const c  = document.getElementById(id + '-c');
      const n  = el.value.length;
      c.textContent = n + ' / ' + max;
      c.className = 'counter ' + (n > max ? 'over' : n > max * 0.85 ? 'warn' : 'ok');
      updateBtn();
    }

    function updateBtn() {
      const h1 = document.getElementById('h1').value.trim();
      const h2 = document.getElementById('h2').value.trim();
      document.getElementById('copybtn').disabled = !(h1 && h2 && h1.length <= 80 && h2.length <= 55);
    }

    function buildOutput() {
      const h1 = document.getElementById('h1').value.trim();
      const h2 = document.getElementById('h2').value.trim();
      return [
        'HEADLINE 1  (max 80 characters \u2014 sets the idea)',
        '',
        h1,
        '(' + h1.length + ' characters)',
        '',
        DIV,
        'HEADLINE 2  (max 55 characters \u2014 drives engagement)',
        '',
        h2,
        '(' + h2.length + ' characters)',
      ].join('\n');
    }

    function copyOutput() {
      const text = buildOutput();
      document.getElementById('output-text').textContent = text;
      document.getElementById('output-wrap').classList.add('visible');

      navigator.clipboard.writeText(text).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
      });
    }
  </script>

</body>
</html>
